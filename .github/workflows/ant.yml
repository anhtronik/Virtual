name: Cek dan Build Clone APK

on:
  workflow_dispatch:
  push:
    paths:
      - "**/*.apk"
      - ".github/workflows/**"
      - "**/*.java"
      - "**/*.kt"
      - "**/*.kts"
      - "**/*.xml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Ambil repo
        uses: actions/checkout@v4

      - name: Lihat isi repo
        shell: bash
        run: |
          echo "ISI REPO:"
          find . -maxdepth 3 -type f | sort

      - name: Cari APK input
        shell: bash
        run: |
          set -e

          APK_PATH="$(find . -type f -iname '*.apk' | head -n 1 || true)"

          if [ -z "$APK_PATH" ]; then
            echo "APK tidak ditemukan."
