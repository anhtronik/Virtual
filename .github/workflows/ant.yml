name: Build Clone APK

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: "Tempel link Google Drive APK di sini"
        required: true
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Ambil repo
        uses: actions/checkout@v4

      - name: Ambil APK dari link
        shell: bash
        run: |
          set -e

          mkdir -p input_apk
          mkdir -p output

          APK_URL="${{ github.event.inputs.apk_url }}"

          if [ -z "$APK_URL" ]; then
            echo "apk_url kosong."
            echo "Jalankan dari Actions > Run workflow, lalu isi link Google Drive APK."
            exit 1
          fi

          echo "Install gdown..."
          python3 -m pip install --upgrade pip
          python3 -m pip install gdown

          echo "Ambil ID Google Drive..."
          FILE_ID="$(echo "$APK_URL" | sed -n 's#.*\/d\/\([^\/]*\).*#\1#p')"

          if [ -z "$FILE_ID" ]; then
            FILE_ID="$(echo "$APK_URL" | sed -n 's#.*id=\([^&]*\).*#\1#p')"
          fi

          if [ -z "$FILE_ID" ]; then
            echo "Gagal ambil ID dari link Google Drive."
            echo "Contoh link benar:"
            echo "https://drive.google.com/file/d/ID_FILE/view?usp=sharing"
            exit 1
          fi

          echo "File ID: $FILE_ID"

          echo "Download APK..."
          gdown "$FILE_ID" -O input_apk/kopi.apk

          echo "Cek ukuran file..."
          ls -lh input_apk/kopi.apk

          echo "Cek APK valid..."
          if ! unzip -t input_apk/kopi.apk >/dev/null 2>&1; then
            echo "File berhasil didownload tapi bukan APK valid."
            echo "Pastikan:"
            echo "1. File Google Drive adalah APK asli"
            echo "2. Akses Drive: Siapa saja yang punya link"
            echo "3. Bukan file ZIP / HTML / file kosong"
            exit 1
          fi

          echo "APK_PATH=input_apk/kopi.apk" >> "$GITHUB_ENV"
          echo "APK siap dipakai: input_apk/kopi.apk"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        shell: bash
        run: |
          set -e

          echo "APK yang dipakai: $APK_PATH"

          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew clean assembleDebug --stacktrace
          elif [ -f "build.gradle.kts" ] || [ -f "build.gradle" ]; then
            gradle clean assembleDebug --stacktrace
          else
            echo "build.gradle / build.gradle.kts tidak ditemukan."
            exit 1
          fi

      - name: Upload hasil APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hasil-apk
          path: |
            **/build/outputs/**/*.apk
            output/**/*.apk
            input_apk/kopi.apk
