      - name: Cek APK input
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p output

          APK_PATH="$(find input_apk Input_apk -maxdepth 1 -type f -iname '*.apk' 2>/dev/null | head -n 1 || true)"

          if [ -z "$APK_PATH" ]; then
            echo "APK tidak ditemukan."
            echo "Pastikan APK ada di salah satu folder ini:"
            echo "- input_apk/kopi.apk"
            echo "- Input_apk/kopi.apk"
            exit 1
          fi

          echo "APK ditemukan: $APK_PATH"

          mkdir -p input_apk
          cp "$APK_PATH" input_apk/kopi.apk

          echo "APK_PATH=input_apk/kopi.apk" >> "$GITHUB_ENV"
