name: Build Clone APK

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: "Link download APK langsung. Kosongkan kalau APK sudah ada di input_apk/kopi.apk"
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Ambil repo
        uses: actions/checkout@v4

      - name: Lihat isi repo
        shell: bash
        run: |
          echo "=== ISI REPO ==="
          find . -maxdepth 4 -type f | sort

      - name: Ambil APK input
        shell: bash
        run: |
          set -e

          mkdir -p input_apk
          mkdir -p output

          APK_URL="${{ github.event.inputs.apk_url }}"

          if [ -n "$APK_URL" ]; then
            echo "Download APK dari URL..."
            curl -L --fail --retry 3 "$APK_URL" -o input_apk/kopi.apk
          else
            echo "Cari APK lokal di repo..."
            APK_PATH="$(find . -path './.git' -prune -o -type f -iname '*.apk' -print | head -n 1 || true)"

            if [ -z "$APK_PATH" ]; then
              echo "APK tidak ditemukan."
              echo "Isi APK URL saat Run workflow, atau upload APK ke input_apk/kopi.apk"
              exit 1
            fi

            echo "APK ditemukan: $APK_PATH"
            cp "$APK_PATH" input_apk/kopi.apk
          fi

          echo "Cek APK valid..."
          if ! unzip -t input_apk/kopi.apk >/dev/null 2>&1; then
            echo "File bukan APK valid."
            echo "Pastikan link yang dimasukkan adalah link download langsung file APK asli."
            exit 1
          fi

          echo "APK_PATH=input_apk/kopi.apk" >> "$GITHUB_ENV"
          echo "APK siap: input_apk/kopi.apk"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        shell: bash
        run: |
          set -e

          echo "APK yang dipakai: $APK_PATH"

          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew clean assembleDebug --stacktrace
          elif [ -f "build.gradle.kts" ] || [ -f "build.gradle" ]; then
            gradle clean assembleDebug --stacktrace
          else
            echo "build.gradle / build.gradle.kts tidak ditemukan."
            exit 1
          fi

      - name: Upload hasil APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hasil-apk
          path: |
            **/build/outputs/**/*.apk
            output/**/*.apk
            input_apk/kopi.apk
