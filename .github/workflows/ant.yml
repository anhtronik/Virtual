name: Build APK Clone Multi Akun

on:
  workflow_dispatch:
    inputs:
      clone_count:
        description: "Jumlah clone yang mau dibuat"
        required: true
        default: "5"
      app_name:
        description: "Nama tampilan aplikasi clone"
        required: false
        default: "ANH Clone"
  push:

jobs:
  build-clones:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Install Apktool terbaru
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y curl unzip jq

          APKTOOL_VERSION=$(curl -s https://api.github.com/repos/iBotPeaches/Apktool/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          echo "Apktool version: $APKTOOL_VERSION"

          curl -L -o apktool.jar "https://github.com/iBotPeaches/Apktool/releases/download/v${APKTOOL_VERSION}/apktool_${APKTOOL_VERSION}.jar"
          test -s apktool.jar

      - name: Buat APK clone beda package
        run: |
          set -euo pipefail

          CLONE_COUNT="${{ github.event.inputs.clone_count }}"
          APP_NAME="${{ github.event.inputs.app_name }}"

          if [ -z "${CLONE_COUNT}" ]; then
            CLONE_COUNT="5"
          fi

          if [ -z "${APP_NAME}" ]; then
            APP_NAME="ANH Clone"
          fi

          if ! [[ "${CLONE_COUNT}" =~ ^[0-9]+$ ]]; then
            echo "clone_count harus angka. Contoh: 5"
            exit 1
          fi

          if [ "${CLONE_COUNT}" -lt 1 ]; then
            echo "clone_count minimal 1"
            exit 1
          fi

          APK_PATH=$(find input_apk -maxdepth 1 -type f -name "*.apk" | head -n 1 || true)

          if [ -z "${APK_PATH}" ]; then
            echo "APK tidak ditemukan. Buat folder input_apk lalu upload APK target, contoh: input_apk/kopi.apk"
            exit 1
          fi

          BUILD_TOOLS=$(ls -d "${ANDROID_HOME}"/build-tools/* | sort -V | tail -n 1)
          export PATH="${BUILD_TOOLS}:${PATH}"

          ORIG_PKG=$(aapt dump badging "${APK_PATH}" | sed -n "s/package: name='\([^']*\)'.*/\1/p" | head -n 1)

          if [ -z "${ORIG_PKG}" ]; then
            echo "Gagal membaca package APK target."
            exit 1
          fi

          echo "APK target: ${APK_PATH}"
          echo "Package asli: ${ORIG_PKG}"
          echo "Jumlah clone: ${CLONE_COUNT}"
          echo "Nama clone: ${APP_NAME}"

          rm -rf work unsigned aligned dist
          mkdir -p work unsigned aligned dist

          if [ ! -f clone-release.keystore ]; then
            keytool -genkeypair \
              -v \
              -keystore clone-release.keystore \
              -storepass android \
              -keypass android \
              -alias clonekey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=ANH Clone,O=ANH,C=ID"
          fi

          for i in $(seq 1 "${CLONE_COUNT}"); do
            NEW_PKG="${ORIG_PKG}.anhclone${i}"
            NEW_LABEL="${APP_NAME} ${i}"
            WORK_DIR="work/clone${i}"

            echo "========================================"
            echo "Membuat Clone ${i}"
            echo "Package baru: ${NEW_PKG}"
            echo "Label baru: ${NEW_LABEL}"

            java -jar apktool.jar d -f "${APK_PATH}" -o "${WORK_DIR}"

            python3 - <<PY
          from pathlib import Path
          import re

          work = Path("${WORK_DIR}")
          orig_pkg = "${ORIG_PKG}"
          new_pkg = "${NEW_PKG}"
          new_label = "${NEW_LABEL}"

          manifest = work / "AndroidManifest.xml"
          text = manifest.read_text(encoding="utf-8", errors="ignore")

          text = re.sub(r'package="[^"]+"', f'package="{new_pkg}"', text, count=1)

          if re.search(r'<application[^>]*android:label="[^"]*"', text):
              text = re.sub(r'(<application[^>]*?)android:label="[^"]*"', rf'\1android:label="{new_label}"', text, count=1)
          else:
              text = re.sub(r'<application', f'<application android:label="{new_label}"', text, count=1)

          text = text.replace(orig_pkg, new_pkg)
          manifest.write_text(text, encoding="utf-8")

          for folder in [work / "res"]:
              if folder.exists():
                  for p in folder.rglob("*.xml"):
                      try:
                          s = p.read_text(encoding="utf-8", errors="ignore")
                      except Exception:
                          continue
                      if orig_pkg in s:
                          p.write_text(s.replace(orig_pkg, new_pkg), encoding="utf-8")

          yml = work / "apktool.yml"
          if yml.exists():
              s = yml.read_text(encoding="utf-8", errors="ignore")
              if "renameManifestPackage:" in s:
                  s = re.sub(r'renameManifestPackage:.*', f'renameManifestPackage: {new_pkg}', s)
              else:
                  s += f"\nrenameManifestPackage: {new_pkg}\n"
              yml.write_text(s, encoding="utf-8")
          PY

            java -jar apktool.jar b "${WORK_DIR}" -o "unsigned/${APP_NAME// /_}-clone${i}-unsigned.apk"

            zipalign -p -f 4 \
              "unsigned/${APP_NAME// /_}-clone${i}-unsigned.apk" \
              "aligned/${APP_NAME// /_}-clone${i}-aligned.apk"

            apksigner sign \
              --ks clone-release.keystore \
              --ks-key-alias clonekey \
              --ks-pass pass:android \
              --key-pass pass:android \
              --out "dist/${APP_NAME// /_}-clone${i}.apk" \
              "aligned/${APP_NAME// /_}-clone${i}-aligned.apk"

            apksigner verify --verbose "dist/${APP_NAME// /_}-clone${i}.apk"
          done

          echo "========================================"
          echo "Selesai. APK clone ada di folder dist:"
          ls -lah dist

      - name: Upload semua APK clone
        uses: actions/upload-artifact@v4
        with:
          name: ANH-apk-clone-multi-akun
          path: dist/*.apk
