name: Build ANH store APK

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Buat project Android ANH store
        run: |
          rm -rf app settings.gradle.kts build.gradle.kts gradle.properties
          mkdir -p app/src/main/java/com/nakula/anhstore
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          cat > settings.gradle.kts <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "ANHStore"
          include(":app")
          EOF

          cat > build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application") version "8.6.1" apply false
          }
          EOF

          cat > gradle.properties <<'EOF'
          android.useAndroidX=false
          android.nonTransitiveRClass=true
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          EOF

          cat > app/build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application")
          }

          android {
              namespace = "com.nakula.anhstore"
              compileSdk = 35

              defaultConfig {
                  applicationId = "com.nakula.anhstore"
                  minSdk = 23
                  targetSdk = 35
                  versionCode = 7
                  versionName = "1.6"
              }
          }
          EOF

          cat > app/src/main/res/values/strings.xml <<'EOF'
          <resources>
              <string name="app_name">ANH store</string>
          </resources>
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="@android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:fontFamily">sans</item>
                  <item name="android:windowLightStatusBar">true</item>
                  <item name="android:colorAccent">#2196F3</item>
                  <item name="android:windowBackground">#F3F6FF</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/res/drawable/ic_launcher.xml <<'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="#1677FF"
                  android:pathData="M18,8 H90 Q100,8 100,18 V90 Q100,100 90,100 H18 Q8,100 8,90 V18 Q8,8 18,8 Z"/>
              <path
                  android:fillColor="#FFFFFF"
                  android:pathData="M26,78 L40,30 H52 L66,78 H54 L51,66 H41 L38,78 Z M44,55 H49 L47,45 Z"/>
              <path
                  android:fillColor="#00D6A3"
                  android:pathData="M64,28 H82 L74,48 H88 L58,84 L66,58 H54 Z"/>
          </vector>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <queries>
                  <intent>
                      <action android:name="android.intent.action.MAIN" />
                      <category android:name="android.intent.category.LAUNCHER" />
                  </intent>
              </queries>

              <application
                  android:theme="@style/AppTheme"
                  android:label="@string/app_name"
                  android:icon="@drawable/ic_launcher"
                  android:roundIcon="@drawable/ic_launcher"
                  android:allowBackup="true"
                  android:usesCleartextTraffic="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/nakula/anhstore/MainActivity.java <<'EOF'
          package com.nakula.anhstore;

          import android.app.Activity;
          import android.content.ClipData;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.content.pm.PackageManager;
          import android.content.pm.ResolveInfo;
          import android.graphics.Color;
          import android.graphics.Typeface;
          import android.graphics.drawable.GradientDrawable;
          import android.os.Build;
          import android.os.Bundle;
          import android.text.TextUtils;
          import android.view.DragEvent;
          import android.view.Gravity;
          import android.view.View;
          import android.widget.Button;
          import android.widget.FrameLayout;
          import android.widget.GridLayout;
          import android.widget.ImageView;
          import android.widget.LinearLayout;
          import android.widget.ScrollView;
          import android.widget.TextView;
          import android.widget.Toast;

          import java.util.ArrayList;
          import java.util.Collections;
          import java.util.List;
          import java.util.Locale;

          public class MainActivity extends Activity {
              private FrameLayout mainFrame;
              private GridLayout cloneBox;
              private LinearLayout appBox;
              private TextView appTitle;
              private TextView trashBox;
              private Button toggleAppsButton;
              private SharedPreferences prefs;
              private PackageManager pm;
              private boolean appsVisible = false;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  prefs = getSharedPreferences("clone_slots", MODE_PRIVATE);
                  pm = getPackageManager();

                  mainFrame = new FrameLayout(this);
                  mainFrame.setBackgroundColor(0xFFF3F6FF);

                  ScrollView scroll = new ScrollView(this);
                  scroll.setFillViewport(true);

                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setPadding(dp(18), dp(22), dp(18), dp(120));
                  root.setBackgroundColor(0xFFF3F6FF);
                  scroll.addView(root);

                  mainFrame.addView(scroll, new FrameLayout.LayoutParams(-1, -1));

                  LinearLayout header = new LinearLayout(this);
                  header.setOrientation(LinearLayout.VERTICAL);
                  header.setPadding(dp(18), dp(18), dp(18), dp(18));
                  header.setBackground(cardBg(0xFF1677FF, dp(24)));
                  root.addView(header, new LinearLayout.LayoutParams(-1, -2));

                  TextView title = new TextView(this);
                  title.setText("ANH store");
                  title.setTextColor(Color.WHITE);
                  title.setTextSize(30);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  header.addView(title);

                  TextView info = new TextView(this);
                  info.setText("Clone aplikasi seperti Dual Space");
                  info.setTextColor(0xEEFFFFFF);
                  info.setTextSize(16);
                  info.setPadding(0, dp(8), 0, 0);
                  header.addView(info);

                  root.addView(sectionTitle("Clone Saya"));

                  cloneBox = new GridLayout(this);
                  cloneBox.setColumnCount(4);
                  cloneBox.setUseDefaultMargins(false);
                  root.addView(cloneBox, new LinearLayout.LayoutParams(-1, -2));

                  LinearLayout actions = new LinearLayout(this);
                  actions.setOrientation(LinearLayout.HORIZONTAL);
                  actions.setPadding(0, dp(12), 0, dp(8));

                  toggleAppsButton = new Button(this);
                  toggleAppsButton.setText("+ Tambah Aplikasi");
                  toggleAppsButton.setOnClickListener(v -> toggleApps());
                  actions.addView(toggleAppsButton, new LinearLayout.LayoutParams(-1, -2));

                  root.addView(actions);

                  appTitle = sectionTitle("Tambah Aplikasi");
                  appTitle.setVisibility(View.GONE);
                  root.addView(appTitle);

                  appBox = new LinearLayout(this);
                  appBox.setOrientation(LinearLayout.VERTICAL);
                  appBox.setVisibility(View.GONE);
                  root.addView(appBox);

                  trashBox = new TextView(this);
                  trashBox.setText("🗑  HAPUS CLONE");
                  trashBox.setTextSize(20);
                  trashBox.setTypeface(Typeface.DEFAULT_BOLD);
                  trashBox.setTextColor(Color.WHITE);
                  trashBox.setGravity(Gravity.CENTER);
                  trashBox.setPadding(dp(12), dp(18), dp(12), dp(18));
                  trashBox.setBackground(cardBg(0xFFE53935, dp(24)));
                  trashBox.setVisibility(View.GONE);
                  trashBox.setOnDragListener((v, event) -> handleTrashDrag(event));

                  FrameLayout.LayoutParams trashLp = new FrameLayout.LayoutParams(-1, dp(86));
                  trashLp.gravity = Gravity.BOTTOM;
                  trashLp.setMargins(dp(18), 0, dp(18), dp(24));
                  mainFrame.addView(trashBox, trashLp);

                  mainFrame.setOnDragListener((v, event) -> {
                      if (event.getAction() == DragEvent.ACTION_DRAG_ENDED) {
                          trashBox.setVisibility(View.GONE);
                      }
                      return true;
                  });

                  setContentView(mainFrame);
                  renderClones();
              }

              private boolean handleTrashDrag(DragEvent event) {
                  switch (event.getAction()) {
                      case DragEvent.ACTION_DRAG_STARTED:
                          trashBox.setVisibility(View.VISIBLE);
                          trashBox.bringToFront();
                          trashBox.setText("🗑  HAPUS CLONE");
                          trashBox.setBackground(cardBg(0xFFE53935, dp(24)));
                          return true;

                      case DragEvent.ACTION_DRAG_ENTERED:
                          trashBox.setText("🗑  LEPAS UNTUK HAPUS");
                          trashBox.setBackground(cardBg(0xFFC62828, dp(24)));
                          return true;

                      case DragEvent.ACTION_DRAG_EXITED:
                          trashBox.setText("🗑  HAPUS CLONE");
                          trashBox.setBackground(cardBg(0xFFE53935, dp(24)));
                          return true;

                      case DragEvent.ACTION_DROP:
                          Object state = event.getLocalState();

                          if (state instanceof Integer) {
                              int index = (Integer) state;
                              deleteClone(index);
                              renderClones();
                              Toast.makeText(this, "Clone dihapus", Toast.LENGTH_SHORT).show();
                          }

                          trashBox.setVisibility(View.GONE);
                          return true;

                      case DragEvent.ACTION_DRAG_ENDED:
                          trashBox.setVisibility(View.GONE);
                          return true;
                  }

                  return true;
              }

              private void toggleApps() {
                  appsVisible = !appsVisible;

                  appTitle.setVisibility(appsVisible ? View.VISIBLE : View.GONE);
                  appBox.setVisibility(appsVisible ? View.VISIBLE : View.GONE);
                  toggleAppsButton.setText(appsVisible ? "Tutup Tambah Aplikasi" : "+ Tambah Aplikasi");

                  if (appsVisible && appBox.getChildCount() == 0) {
                      loadApps();
                  }
              }

              private TextView sectionTitle(String s) {
                  TextView t = new TextView(this);
                  t.setText(s);
                  t.setTextSize(23);
                  t.setTypeface(Typeface.DEFAULT_BOLD);
                  t.setTextColor(0xFF0F172A);
                  t.setPadding(0, dp(18), 0, dp(10));
                  return t;
              }

              private void loadApps() {
                  appBox.removeAllViews();

                  Intent main = new Intent(Intent.ACTION_MAIN, null);
                  main.addCategory(Intent.CATEGORY_LAUNCHER);

                  List<ResolveInfo> apps = pm.queryIntentActivities(main, 0);
                  Collections.sort(apps, new ResolveInfo.DisplayNameComparator(pm));

                  int shown = 0;

                  for (ResolveInfo ri : apps) {
                      String pkg = ri.activityInfo.packageName;

                      if (pkg.equals(getPackageName())) {
                          continue;
                      }

                      String label = ri.loadLabel(pm).toString();
                      appBox.addView(appRow(label, pkg, ri));
                      shown++;
                  }

                  if (shown == 0) {
                      TextView empty = new TextView(this);
                      empty.setText("Aplikasi tidak ditemukan.");
                      empty.setTextColor(0xFF64748B);
                      empty.setPadding(0, dp(6), 0, dp(6));
                      appBox.addView(empty);
                  }
              }

              private View appRow(String label, String pkg, ResolveInfo ri) {
                  LinearLayout row = new LinearLayout(this);
                  row.setOrientation(LinearLayout.HORIZONTAL);
                  row.setGravity(Gravity.CENTER_VERTICAL);
                  row.setPadding(dp(12), dp(10), dp(12), dp(10));
                  row.setBackground(cardBg(Color.WHITE, dp(16)));

                  ImageView icon = appIcon(pkg, ri);
                  row.addView(icon, new LinearLayout.LayoutParams(dp(50), dp(50)));

                  LinearLayout texts = new LinearLayout(this);
                  texts.setOrientation(LinearLayout.VERTICAL);
                  texts.setPadding(dp(12), 0, dp(8), 0);

                  TextView name = new TextView(this);
                  name.setText(label);
                  name.setTextColor(0xFF111827);
                  name.setTextSize(16);
                  name.setTypeface(Typeface.DEFAULT_BOLD);

                  TextView pack = new TextView(this);
                  pack.setText(pkg);
                  pack.setTextColor(0xFF64748B);
                  pack.setTextSize(12);

                  texts.addView(name);
                  texts.addView(pack);
                  row.addView(texts, new LinearLayout.LayoutParams(0, -2, 1));

                  Button add = new Button(this);
                  add.setText("+ Clone");
                  add.setOnClickListener(v -> addClone(label, pkg));
                  row.addView(add);

                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(-1, -2);
                  lp.setMargins(0, 0, 0, dp(10));
                  row.setLayoutParams(lp);

                  return row;
              }

              private void addClone(String label, String pkg) {
                  int count = prefs.getInt("count", 0) + 1;

                  prefs.edit()
                          .putInt("count", count)
                          .putString("clone_" + count, label + "||" + pkg)
                          .apply();

                  renderClones();

                  appsVisible = true;
                  appTitle.setVisibility(View.VISIBLE);
                  appBox.setVisibility(View.VISIBLE);
                  toggleAppsButton.setText("Tutup Tambah Aplikasi");

                  Toast.makeText(this, "Clone ditambah: " + label + " " + count, Toast.LENGTH_SHORT).show();
              }

              private void deleteClone(int deleteIndex) {
                  int count = prefs.getInt("count", 0);
                  List<String> dataList = new ArrayList<>();

                  for (int i = 1; i <= count; i++) {
                      if (i == deleteIndex) {
                          continue;
                      }

                      String data = prefs.getString("clone_" + i, null);

                      if (data != null) {
                          dataList.add(data);
                      }
                  }

                  SharedPreferences.Editor editor = prefs.edit();
                  editor.clear();
                  editor.putInt("count", dataList.size());

                  for (int i = 0; i < dataList.size(); i++) {
                      editor.putString("clone_" + (i + 1), dataList.get(i));
                  }

                  editor.apply();
              }

              private void renderClones() {
                  cloneBox.removeAllViews();

                  int count = prefs.getInt("count", 0);
                  int shown = 0;

                  for (int i = 1; i <= count; i++) {
                      String data = prefs.getString("clone_" + i, null);

                      if (data == null) {
                          continue;
                      }

                      String[] p = data.split("\\|\\|", 2);
                      String label = p.length > 0 ? p[0] : "App";
                      String pkg = p.length > 1 ? p[1] : "";

                      cloneBox.addView(cloneCard(i, label, pkg));
                      shown++;
                  }

                  if (shown == 0) {
                      TextView empty = new TextView(this);
                      empty.setText("Belum ada clone. Tekan tombol + Tambah Aplikasi.");
                      empty.setTextColor(0xFF64748B);
                      empty.setPadding(0, dp(4), 0, dp(4));
                      cloneBox.addView(empty);
                  }
              }

              private View cloneCard(int index, String label, String pkg) {
                  LinearLayout card = new LinearLayout(this);
                  card.setOrientation(LinearLayout.VERTICAL);
                  card.setGravity(Gravity.CENTER);
                  card.setPadding(dp(6), dp(8), dp(6), dp(6));
                  card.setBackground(cardBg(Color.WHITE, dp(14)));

                  ImageView icon = appIcon(pkg, null);
                  card.addView(icon, new LinearLayout.LayoutParams(dp(46), dp(46)));

                  TextView name = new TextView(this);
                  name.setText(String.format(Locale.US, "%s %d", label, index));
                  name.setTextColor(0xFF111827);
                  name.setTextSize(14);
                  name.setGravity(Gravity.CENTER);
                  name.setSingleLine(true);
                  name.setEllipsize(TextUtils.TruncateAt.END);
                  name.setPadding(0, dp(5), 0, 0);
                  card.addView(name, new LinearLayout.LayoutParams(-1, -2));

                  card.setOnClickListener(v -> openApp(pkg));

                  card.setOnLongClickListener(v -> {
                      trashBox.setVisibility(View.VISIBLE);
                      trashBox.bringToFront();
                      trashBox.setText("🗑  HAPUS CLONE");
                      trashBox.setBackground(cardBg(0xFFE53935, dp(24)));

                      ClipData data = ClipData.newPlainText("clone", String.valueOf(index));
                      View.DragShadowBuilder shadow = new View.DragShadowBuilder(card);

                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.N) {
                          card.startDragAndDrop(data, shadow, Integer.valueOf(index), 0);
                      } else {
                          card.startDrag(data, shadow, Integer.valueOf(index), 0);
                      }

                      return true;
                  });

                  int screen = getResources().getDisplayMetrics().widthPixels;
                  int itemWidth = (screen - dp(36) - dp(32)) / 4;

                  GridLayout.LayoutParams lp = new GridLayout.LayoutParams();
                  lp.width = itemWidth;
                  lp.height = dp(105);
                  lp.setMargins(dp(4), dp(4), dp(4), dp(8));
                  card.setLayoutParams(lp);

                  return card;
              }

              private ImageView appIcon(String pkg, ResolveInfo ri) {
                  ImageView icon = new ImageView(this);

                  try {
                      if (ri != null) {
                          icon.setImageDrawable(ri.loadIcon(pm));
                      } else {
                          icon.setImageDrawable(pm.getApplicationIcon(pkg));
                      }
                  } catch (Exception e) {
                      icon.setImageResource(android.R.drawable.sym_def_app_icon);
                  }

                  icon.setPadding(dp(2), dp(2), dp(2), dp(2));
                  return icon;
              }

              private void openApp(String pkg) {
                  Intent launch = pm.getLaunchIntentForPackage(pkg);

                  if (launch == null) {
                      Toast.makeText(this, "App tidak bisa dibuka", Toast.LENGTH_SHORT).show();
                      return;
                  }

                  startActivity(launch);
              }

              private GradientDrawable cardBg(int color, int radius) {
                  GradientDrawable bg = new GradientDrawable();
                  bg.setColor(color);
                  bg.setCornerRadius(radius);
                  return bg;
              }

              private int dp(int value) {
                  return (int) (value * getResources().getDisplayMetrics().density + 0.5f);
              }
          }
          EOF

      - name: Build APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ANH-store-apk
          path: app/build/outputs/apk/debug/*.apk
