name: Build Clone APK

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: "Tempel link Google Drive APK di sini"
        required: true
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Ambil repo
        uses: actions/checkout@v4

      - name: Ambil APK dari link
        shell: bash
        run: |
          set -e

          mkdir -p input_apk
          mkdir -p output

          APK_URL="${{ github.event.inputs.apk_url }}"

          echo "Install downloader Google Drive..."
          python3 -m pip install --upgrade pip
          python3 -m pip install gdown

          echo "Download APK dari link..."
          gdown --fuzzy "$APK_URL" -O input_apk/kopi.apk

          echo "Cek file APK..."
          ls -lh input_apk/kopi.apk

          if ! unzip -t input_apk/kopi.apk >/dev/null 2>&1; then
            echo "File berhasil didownload tapi bukan APK valid."
            echo "Pastikan link Google Drive diarahkan ke file APK asli, bukan ZIP/kosong."
            exit 1
          fi

          echo "APK_PATH=input_apk/kopi.apk" >> "$GITHUB_ENV"
          echo "APK siap dipakai: input_apk/kopi.apk"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        shell: bash
        run: |
          set -e

          echo "APK yang dipakai: $APK_PATH"

          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew clean assembleDebug --stacktrace
          elif [ -f "build.gradle.kts" ] || [ -f "build.gradle" ]; then
            gradle clean assembleDebug --stacktrace
          else
            echo "build.gradle / build.gradle.kts tidak ditemukan."
            exit 1
          fi

      - name: Upload hasil APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hasil-apk
          path: |
            **/build/outputs/**/*.apk
            output/**/*.apk
            input_apk/kopi.apk
