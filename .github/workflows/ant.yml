name: Build Clone APK

on:
  workflow_dispatch:
  push:
    paths:
      - "**/*.apk"
      - ".github/workflows/**"
      - "**/*.java"
      - "**/*.kt"
      - "**/*.kts"
      - "**/*.xml"
      - "*.gradle"
      - "*.gradle.kts"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Ambil repo
        uses: actions/checkout@v4

      - name: Lihat isi repo
        shell: bash
        run: |
          echo "=== ISI REPO ==="
          find . -maxdepth 4 -type f | sort

      - name: Cari APK input
        shell: bash
        run: |
          set -e

          mkdir -p input_apk
          mkdir -p output

          echo "=== CARI FILE .APK ==="

          APK_PATH="$(find . -path './.git' -prune -o -type f -iname '*.apk' -print | head -n 1 || true)"

          if [ -z "$APK_PATH" ]; then
            echo "APK tidak ditemukan."
            echo ""
            echo "Yang benar upload APK asli seperti ini:"
            echo "Input_apk/kopi.apk"
            echo "atau"
            echo "input_apk/kopi.apk"
            echo ""
            echo "Catatan:"
            echo "- Input_apk harus folder"
            echo "- kopi.apk harus file APK asli"
            echo "- Jangan buat file kosong bernama Input_apk"
            echo ""
            echo "Isi repo sekarang:"
            find . -maxdepth 4 -type f | sort
            exit 1
          fi

          echo "APK ditemukan: $APK_PATH"

          if ! unzip -t "$APK_PATH" >/dev/null 2>&1; then
            echo "File .apk ditemukan tapi bukan APK valid: $APK_PATH"
            echo "Upload ulang APK asli dari aplikasi target."
            exit 1
          fi

          cp "$APK_PATH" input_apk/kopi.apk
          echo "APK_PATH=input_apk/kopi.apk" >> "$GITHUB_ENV"

          echo "APK siap dipakai: input_apk/kopi.apk"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        shell: bash
        run: |
          set -e

          echo "APK yang dipakai: $APK_PATH"

          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew clean assembleDebug --stacktrace
          elif [ -f "build.gradle.kts" ] || [ -f "build.gradle" ]; then
            gradle clean assembleDebug --stacktrace
          else
            echo "build.gradle / build.gradle.kts tidak ditemukan."
            exit 1
          fi

      - name: Upload hasil APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hasil-apk
          path: |
            **/build/outputs/**/*.apk
            output/**/*.apk
            input_apk/kopi.apk
