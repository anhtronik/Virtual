      - name: Ambil APK dari link
        shell: bash
        run: |
          set -e

          mkdir -p input_apk
          mkdir -p output

          APK_URL="${{ github.event.inputs.apk_url }}"

          echo "Install downloader Google Drive..."
          python3 -m pip install --upgrade pip
          python3 -m pip install gdown

          echo "Ambil ID file Google Drive..."

          FILE_ID="$(echo "$APK_URL" | sed -n 's#.*\/d\/\([^\/]*\).*#\1#p')"

          if [ -z "$FILE_ID" ]; then
            FILE_ID="$(echo "$APK_URL" | sed -n 's#.*id=\([^&]*\).*#\1#p')"
          fi

          if [ -z "$FILE_ID" ]; then
            echo "Gagal ambil ID Google Drive dari link."
            echo "Link harus seperti:"
            echo "https://drive.google.com/file/d/ID_FILE/view"
            exit 1
          fi

          echo "File ID: $FILE_ID"

          echo "Download APK..."
          gdown "$FILE_ID" -O input_apk/kopi.apk

          echo "Cek file APK..."
          ls -lh input_apk/kopi.apk

          if ! unzip -t input_apk/kopi.apk >/dev/null 2>&1; then
            echo "File berhasil didownload tapi bukan APK valid."
            echo "Pastikan link Google Drive diarahkan ke file APK asli."
            echo "Pastikan akses Drive: Siapa saja yang punya link."
            exit 1
          fi

          echo "APK_PATH=input_apk/kopi.apk" >> "$GITHUB_ENV"
          echo "APK siap dipakai: input_apk/kopi.apk"
