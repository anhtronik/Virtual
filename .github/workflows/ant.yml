name: Build ANH store APK

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Buat project Android ANH store
        run: |
          rm -rf app settings.gradle.kts build.gradle.kts gradle.properties
          mkdir -p app/src/main/java/com/nakula/anhstore
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          cat > settings.gradle.kts <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "ANHStore"
          include(":app")
          EOF

          cat > build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application") version "8.6.1" apply false
          }
          EOF

          cat > gradle.properties <<'EOF'
          android.useAndroidX=false
          android.nonTransitiveRClass=true
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          EOF

          cat > app/build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application")
          }

          android {
              namespace = "com.nakula.anhstore"
              compileSdk = 35

              defaultConfig {
                  applicationId = "com.nakula.anhstore"
                  minSdk = 23
                  targetSdk = 35
                  versionCode = 2
                  versionName = "1.1"
              }
          }
          EOF

          cat > app/src/main/res/values/strings.xml <<'EOF'
          <resources>
              <string name="app_name">ANH store</string>
          </resources>
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="@android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:fontFamily">sans</item>
                  <item name="android:windowLightStatusBar">true</item>
                  <item name="android:colorAccent">#2196F3</item>
                  <item name="android:windowBackground">#F3F6FF</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/res/drawable/ic_launcher.xml <<'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="#1677FF"
                  android:pathData="M8,8 H100 V100 H8 Z"/>
              <path
                  android:fillColor="#FFFFFF"
                  android:pathData="M54,20 L84,88 H68 L62,74 H46 L40,88 H24 Z M50,62 H58 L54,48 Z"/>
              <path
                  android:fillColor="#00C2A8"
                  android:pathData="M76,18 H96 L84,42 H98 L62,90 L72,58 H58 Z"/>
          </vector>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <queries>
                  <intent>
                      <action android:name="android.intent.action.MAIN" />
                      <category android:name="android.intent.category.LAUNCHER" />
                  </intent>
              </queries>

              <application
                  android:theme="@style/AppTheme"
                  android:label="@string/app_name"
                  android:icon="@drawable/ic_launcher"
                  android:roundIcon="@drawable/ic_launcher"
                  android:allowBackup="true"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name="com.nakula.anhstore.MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/nakula/anhstore/MainActivity.java <<'EOF'
          package com.nakula.anhstore;

          import android.app.Activity;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.content.pm.PackageManager;
          import android.content.pm.ResolveInfo;
          import android.graphics.Color;
          import android.graphics.Typeface;
          import android.graphics.drawable.GradientDrawable;
          import android.os.Bundle;
          import android.view.Gravity;
          import android.view.View;
          import android.widget.Button;
          import android.widget.ImageView;
          import android.widget.LinearLayout;
          import android.widget.ScrollView;
          import android.widget.TextView;
          import android.widget.Toast;

          import java.util.Collections;
          import java.util.List;
          import java.util.Locale;

          public class MainActivity extends Activity {
              private LinearLayout cloneBox;
              private LinearLayout appBox;
              private TextView appTitle;
              private Button toggleAppsButton;
              private SharedPreferences prefs;
              private PackageManager pm;
              private boolean appsVisible = false;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  prefs = getSharedPreferences("clone_slots", MODE_PRIVATE);
                  pm = getPackageManager();

                  ScrollView scroll = new ScrollView(this);
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setPadding(dp(18), dp(22), dp(18), dp(22));
                  scroll.addView(root);

                  LinearLayout header = new LinearLayout(this);
                  header.setOrientation(LinearLayout.VERTICAL);
                  header.setPadding(dp(18), dp(18), dp(18), dp(18));
                  header.setBackground(cardBg(0xFF1E88FF, dp(24)));
                  root.addView(header, new LinearLayout.LayoutParams(-1, -2));

                  TextView title = new TextView(this);
                  title.setText("ANH store");
                  title.setTextColor(Color.WHITE);
                  title.setTextSize(28);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  header.addView(title);

                  TextView info = new TextView(this);
                  info.setText("Clone aplikasi seperti Dual Space");
                  info.setTextColor(0xEEFFFFFF);
                  info.setTextSize(16);
                  info.setPadding(0, dp(8), 0, 0);
                  header.addView(info);

                  TextView cloneTitle = sectionTitle("Clone Saya");
                  root.addView(cloneTitle);

                  cloneBox = new LinearLayout(this);
                  cloneBox.setOrientation(LinearLayout.VERTICAL);
                  root.addView(cloneBox);

                  LinearLayout actions = new LinearLayout(this);
                  actions.setOrientation(LinearLayout.HORIZONTAL);
                  actions.setPadding(0, dp(12), 0, dp(8));

                  toggleAppsButton = new Button(this);
                  toggleAppsButton.setText("+ Tambah Aplikasi");
                  toggleAppsButton.setOnClickListener(v -> toggleApps());
                  actions.addView(toggleAppsButton, new LinearLayout.LayoutParams(0, -2, 1));

                  Button clear = new Button(this);
                  clear.setText("Hapus Clone");
                  clear.setOnClickListener(v -> {
                      prefs.edit().clear().apply();
                      renderClones();
                      Toast.makeText(this, "Semua clone dihapus", Toast.LENGTH_SHORT).show();
                  });
                  actions.addView(clear, new LinearLayout.LayoutParams(0, -2, 1));

                  root.addView(actions);

                  appTitle = sectionTitle("Tambah Aplikasi");
                  appTitle.setVisibility(View.GONE);
                  root.addView(appTitle);

                  appBox = new LinearLayout(this);
                  appBox.setOrientation(LinearLayout.VERTICAL);
                  appBox.setVisibility(View.GONE);
                  root.addView(appBox);

                  setContentView(scroll);
                  renderClones();
              }

              private void toggleApps() {
                  appsVisible = !appsVisible;
                  appTitle.setVisibility(appsVisible ? View.VISIBLE : View.GONE);
                  appBox.setVisibility(appsVisible ? View.VISIBLE : View.GONE);
                  toggleAppsButton.setText(appsVisible ? "Tutup Tambah Aplikasi" : "+ Tambah Aplikasi");

                  if (appsVisible && appBox.getChildCount() == 0) {
                      loadApps();
                  }
              }

              private TextView sectionTitle(String s) {
                  TextView t = new TextView(this);
                  t.setText(s);
                  t.setTextSize(22);
                  t.setTypeface(Typeface.DEFAULT_BOLD);
                  t.setTextColor(0xFF0F172A);
                  t.setPadding(0, dp(18), 0, dp(10));
                  return t;
              }

              private void loadApps() {
                  appBox.removeAllViews();

                  Intent main = new Intent(Intent.ACTION_MAIN, null);
                  main.addCategory(Intent.CATEGORY_LAUNCHER);

                  List<ResolveInfo> apps = pm.queryIntentActivities(main, 0);
                  Collections.sort(apps, new ResolveInfo.DisplayNameComparator(pm));

                  int shown = 0;

                  for (ResolveInfo ri : apps) {
                      String pkg = ri.activityInfo.packageName;

                      if (pkg.equals(getPackageName())) {
                          continue;
                      }

                      String label = ri.loadLabel(pm).toString();
                      appBox.addView(appRow(label, pkg, ri));
                      shown++;
                  }

                  if (shown == 0) {
                      TextView empty = new TextView(this);
                      empty.setText("Aplikasi tidak ditemukan.");
                      empty.setPadding(0, dp(6), 0, dp(6));
                      appBox.addView(empty);
                  }
              }

              private View appRow(String label, String pkg, ResolveInfo ri) {
                  LinearLayout row = new LinearLayout(this);
                  row.setOrientation(LinearLayout.HORIZONTAL);
                  row.setGravity(Gravity.CENTER_VERTICAL);
                  row.setPadding(dp(12), dp(10), dp(12), dp(10));
                  row.setBackground(cardBg(Color.WHITE, dp(16)));

                  ImageView icon = appIcon(pkg, ri);
                  row.addView(icon, new LinearLayout.LayoutParams(dp(48), dp(48)));

                  LinearLayout texts = new LinearLayout(this);
                  texts.setOrientation(LinearLayout.VERTICAL);
                  texts.setPadding(dp(12), 0, dp(8), 0);

                  TextView name = new TextView(this);
                  name.setText(label);
                  name.setTextColor(0xFF111827);
                  name.setTextSize(16);
                  name.setTypeface(Typeface.DEFAULT_BOLD);

                  TextView pack = new TextView(this);
                  pack.setText(pkg);
                  pack.setTextColor(0xFF64748B);
                  pack.setTextSize(12);

                  texts.addView(name);
                  texts.addView(pack);
                  row.addView(texts, new LinearLayout.LayoutParams(0, -2, 1));

                  Button add = new Button(this);
                  add.setText("+ Clone");
                  add.setOnClickListener(v -> addClone(label, pkg));
                  row.addView(add);

                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(-1, -2);
                  lp.setMargins(0, 0, 0, dp(10));
                  row.setLayoutParams(lp);

                  return row;
              }

              private void addClone(String label, String pkg) {
                  int count = prefs.getInt("count", 0) + 1;

                  prefs.edit()
                          .putInt("count", count)
                          .putString("clone_" + count, label + "||" + pkg)
                          .apply();

                  renderClones();

                  appsVisible = false;
                  appTitle.setVisibility(View.GONE);
                  appBox.setVisibility(View.GONE);
                  toggleAppsButton.setText("+ Tambah Aplikasi");

                  Toast.makeText(this, "Clone dibuat: " + label + " " + count, Toast.LENGTH_SHORT).show();
              }

              private void renderClones() {
                  cloneBox.removeAllViews();

                  int count = prefs.getInt("count", 0);
                  int shown = 0;

                  for (int i = 1; i <= count; i++) {
                      String data = prefs.getString("clone_" + i, null);

                      if (data == null) {
                          continue;
                      }

                      String[] p = data.split("\\|\\|", 2);
                      String label = p.length > 0 ? p[0] : "App";
                      String pkg = p.length > 1 ? p[1] : "";

                      cloneBox.addView(cloneRow(i, label, pkg));
                      shown++;
                  }

                  if (shown == 0) {
                      TextView empty = new TextView(this);
                      empty.setText("Belum ada clone. Tekan tombol + Tambah Aplikasi.");
                      empty.setTextColor(0xFF64748B);
                      empty.setPadding(0, dp(4), 0, dp(4));
                      cloneBox.addView(empty);
                  }
              }

              private View cloneRow(int index, String label, String pkg) {
                  LinearLayout row = new LinearLayout(this);
                  row.setOrientation(LinearLayout.HORIZONTAL);
                  row.setGravity(Gravity.CENTER_VERTICAL);
                  row.setPadding(dp(12), dp(10), dp(12), dp(10));
                  row.setBackground(cardBg(Color.WHITE, dp(16)));

                  ImageView icon = appIcon(pkg, null);
                  row.addView(icon, new LinearLayout.LayoutParams(dp(48), dp(48)));

                  LinearLayout texts = new LinearLayout(this);
                  texts.setOrientation(LinearLayout.VERTICAL);
                  texts.setPadding(dp(12), 0, dp(8), 0);

                  TextView name = new TextView(this);
                  name.setText(String.format(Locale.US, "%s %d", label, index));
                  name.setTextColor(0xFF111827);
                  name.setTextSize(16);
                  name.setTypeface(Typeface.DEFAULT_BOLD);

                  TextView pack = new TextView(this);
                  pack.setText(pkg);
                  pack.setTextColor(0xFF64748B);
                  pack.setTextSize(12);

                  texts.addView(name);
                  texts.addView(pack);
                  row.addView(texts, new LinearLayout.LayoutParams(0, -2, 1));

                  Button open = new Button(this);
                  open.setText("Buka");
                  open.setOnClickListener(v -> openApp(pkg));
                  row.addView(open);

                  Button del = new Button(this);
                  del.setText("Hapus");
                  del.setOnClickListener(v -> {
                      prefs.edit().remove("clone_" + index).apply();
                      renderClones();
                  });
                  row.addView(del);

                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(-1, -2);
                  lp.setMargins(0, 0, 0, dp(10));
                  row.setLayoutParams(lp);

                  return row;
              }

              private ImageView appIcon(String pkg, ResolveInfo ri) {
                  ImageView icon = new ImageView(this);

                  try {
                      if (ri != null) {
                          icon.setImageDrawable(ri.loadIcon(pm));
                      } else {
                          icon.setImageDrawable(pm.getApplicationIcon(pkg));
                      }
                  } catch (Exception e) {
                      icon.setImageResource(android.R.drawable.sym_def_app_icon);
                  }

                  icon.setPadding(dp(2), dp(2), dp(2), dp(2));

                  return icon;
              }

              private void openApp(String pkg) {
                  Intent launch = pm.getLaunchIntentForPackage(pkg);

                  if (launch == null) {
                      Toast.makeText(this, "App tidak bisa dibuka", Toast.LENGTH_SHORT).show();
                      return;
                  }

                  startActivity(launch);
              }

              private GradientDrawable cardBg(int color, int radius) {
                  GradientDrawable bg = new GradientDrawable();
                  bg.setColor(color);
                  bg.setCornerRadius(radius);
                  return bg;
              }

              private int dp(int value) {
                  return (int) (value * getResources().getDisplayMetrics().density + 0.5f);
              }
          }
          EOF

      - name: Build APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ANH-store-apk
          path: app/build/outputs/apk/debug/*.apk          }

          rootProject.name = "DualCloneSpace"
          include(":app")
          EOF

          cat > build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application") version "8.5.2" apply false
          }
          EOF

          cat > gradle.properties <<'EOF'
          android.useAndroidX=false
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          EOF

          cat > app/build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application")
          }

          android {
              namespace = "com.digitalizha.dualclone"
              compileSdk = 35

              defaultConfig {
                  applicationId = "com.digitalizha.dualclone"
                  minSdk = 23
                  targetSdk = 35
                  versionCode = 3
                  versionName = "1.2"
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
          }
          EOF

          cat > app/src/main/res/values/strings.xml <<'EOF'
          <resources>
              <string name="app_name">Dual Clone Space</string>
          </resources>
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="@android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:fontFamily">sans</item>
                  <item name="android:windowLightStatusBar">true</item>
                  <item name="android:navigationBarColor">#F4F7FF</item>
                  <item name="android:colorAccent">#247CFF</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <queries>
                  <intent>
                      <action android:name="android.intent.action.MAIN" />
                      <category android:name="android.intent.category.LAUNCHER" />
                  </intent>
              </queries>

              <application
                  android:label="@string/app_name"
                  android:theme="@style/AppTheme"
                  android:allowBackup="false"
                  android:supportsRtl="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/digitalizha/dualclone/MainActivity.java <<'EOF'
          package com.digitalizha.dualclone;

          import android.app.Activity;
          import android.os.Bundle;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.content.pm.PackageManager;
          import android.content.pm.ResolveInfo;
          import android.graphics.Color;
          import android.graphics.Typeface;
          import android.graphics.drawable.Drawable;
          import android.graphics.drawable.GradientDrawable;
          import android.view.Gravity;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.AdapterView;
          import android.widget.BaseAdapter;
          import android.widget.EditText;
          import android.widget.FrameLayout;
          import android.widget.GridView;
          import android.widget.ImageView;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          import android.widget.Toast;
          import android.text.Editable;
          import android.text.TextWatcher;

          import java.util.ArrayList;
          import java.util.Collections;
          import java.util.Comparator;
          import java.util.List;

          public class MainActivity extends Activity {
              private ArrayList<AppItem> allApps = new ArrayList<AppItem>();
              private ArrayList<AppItem> shownApps = new ArrayList<AppItem>();
              private ArrayList<CloneItem> clones = new ArrayList<CloneItem>();

              private AppAdapter appAdapter;
              private CloneAdapter cloneAdapter;
              private SharedPreferences prefs;
              private TextView cloneCount;
              private TextView appCount;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  prefs = getSharedPreferences("data_clone", MODE_PRIVATE);

                  FrameLayout frame = new FrameLayout(this);
                  frame.setBackgroundColor(Color.parseColor("#F4F7FF"));

                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setPadding(dp(14), dp(14), dp(14), dp(14));
                  frame.addView(root);

                  LinearLayout header = new LinearLayout(this);
                  header.setOrientation(LinearLayout.VERTICAL);
                  header.setPadding(dp(18), dp(18), dp(18), dp(18));
                  header.setBackground(gradient("#247CFF", "#7357FF", 28));
                  root.addView(header);

                  TextView title = new TextView(this);
                  title.setText("Dual Clone Space");
                  title.setTextColor(Color.WHITE);
                  title.setTextSize(27);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  header.addView(title);

                  TextView subtitle = new TextView(this);
                  subtitle.setText("Clone aplikasi seperti Dual Space");
                  subtitle.setTextColor(Color.parseColor("#EAF1FF"));
                  subtitle.setTextSize(14);
                  subtitle.setPadding(0, dp(5), 0, dp(14));
                  header.addView(subtitle);

                  LinearLayout stats = new LinearLayout(this);
                  stats.setOrientation(LinearLayout.HORIZONTAL);
                  header.addView(stats);

                  cloneCount = statBox("0 Clone");
                  appCount = statBox("0 App");

                  stats.addView(cloneCount, new LinearLayout.LayoutParams(0, dp(54), 1));
                  TextView space = new TextView(this);
                  stats.addView(space, new LinearLayout.LayoutParams(dp(10), 1));
                  stats.addView(appCount, new LinearLayout.LayoutParams(0, dp(54), 1));

                  EditText search = new EditText(this);
                  search.setHint("Cari aplikasi...");
                  search.setTextSize(15);
                  search.setSingleLine(true);
                  search.setPadding(dp(16), 0, dp(16), 0);
                  search.setBackground(box("#FFFFFF", 22, "#DDE6FF"));
                  LinearLayout.LayoutParams searchLp = new LinearLayout.LayoutParams(
                          ViewGroup.LayoutParams.MATCH_PARENT, dp(50));
                  searchLp.setMargins(0, dp(14), 0, dp(10));
                  root.addView(search, searchLp);

                  root.addView(section("Clone Saya"));

                  GridView cloneGrid = new GridView(this);
                  cloneGrid.setNumColumns(4);
                  cloneGrid.setHorizontalSpacing(dp(8));
                  cloneGrid.setVerticalSpacing(dp(8));
                  cloneGrid.setPadding(0, dp(4), 0, dp(4));
                  root.addView(cloneGrid, new LinearLayout.LayoutParams(
                          ViewGroup.LayoutParams.MATCH_PARENT, dp(175)));

                  root.addView(section("Tambah Aplikasi"));

                  GridView appGrid = new GridView(this);
                  appGrid.setNumColumns(4);
                  appGrid.setHorizontalSpacing(dp(8));
                  appGrid.setVerticalSpacing(dp(12));
                  appGrid.setPadding(0, dp(6), 0, dp(90));
                  root.addView(appGrid, new LinearLayout.LayoutParams(
                          ViewGroup.LayoutParams.MATCH_PARENT, 0, 1));

                  TextView plus = new TextView(this);
                  plus.setText("+");
                  plus.setTextColor(Color.WHITE);
                  plus.setTextSize(38);
                  plus.setGravity(Gravity.CENTER);
                  plus.setTypeface(Typeface.DEFAULT_BOLD);
                  plus.setBackground(box("#247CFF", 50, null));

                  FrameLayout.LayoutParams plusLp = new FrameLayout.LayoutParams(dp(72), dp(72));
                  plusLp.gravity = Gravity.BOTTOM | Gravity.RIGHT;
                  plusLp.setMargins(0, 0, dp(22), dp(24));
                  frame.addView(plus, plusLp);

                  setContentView(frame);

                  appAdapter = new AppAdapter();
                  cloneAdapter = new CloneAdapter();

                  appGrid.setAdapter(appAdapter);
                  cloneGrid.setAdapter(cloneAdapter);

                  appGrid.setOnItemClickListener(new AdapterView.OnItemClickListener() {
                      @Override
                      public void onItemClick(AdapterView<?> parent, View view, int position, long id) {
                          addClone(shownApps.get(position));
                      }
                  });

                  cloneGrid.setOnItemClickListener(new AdapterView.OnItemClickListener() {
                      @Override
                      public void onItemClick(AdapterView<?> parent, View view, int position, long id) {
                          openApp(clones.get(position).packageName);
                      }
                  });

                  cloneGrid.setOnItemLongClickListener(new AdapterView.OnItemLongClickListener() {
                      @Override
                      public boolean onItemLongClick(AdapterView<?> parent, View view, int position, long id) {
                          clones.remove(position);
                          saveClones();
                          cloneAdapter.notifyDataSetChanged();
                          updateCount();
                          Toast.makeText(MainActivity.this, "Clone dihapus", Toast.LENGTH_SHORT).show();
                          return true;
                      }
                  });

                  plus.setOnClickListener(new View.OnClickListener() {
                      @Override
                      public void onClick(View v) {
                          Toast.makeText(MainActivity.this, "Pilih aplikasi di daftar bawah", Toast.LENGTH_SHORT).show();
                      }
                  });

                  search.addTextChangedListener(new TextWatcher() {
                      @Override public void beforeTextChanged(CharSequence s, int start, int count, int after) {}
                      @Override public void onTextChanged(CharSequence s, int start, int before, int count) {
                          filter(s.toString());
                      }
                      @Override public void afterTextChanged(Editable s) {}
                  });

                  loadClones();
                  loadApps();
              }

              private void loadApps() {
                  allApps.clear();
                  shownApps.clear();

                  PackageManager pm = getPackageManager();
                  Intent intent = new Intent(Intent.ACTION_MAIN);
                  intent.addCategory(Intent.CATEGORY_LAUNCHER);

                  List<ResolveInfo> list = pm.queryIntentActivities(intent, 0);

                  for (int i = 0; i < list.size(); i++) {
                      ResolveInfo info = list.get(i);
                      String label = info.loadLabel(pm).toString();
                      String pkg = info.activityInfo.packageName;
                      Drawable icon = info.loadIcon(pm);

                      if (!pkg.equals(getPackageName())) {
                          allApps.add(new AppItem(label, pkg, icon));
                      }
                  }

                  Collections.sort(allApps, new Comparator<AppItem>() {
                      @Override
                      public int compare(AppItem a, AppItem b) {
                          return a.label.compareToIgnoreCase(b.label);
                      }
                  });

                  shownApps.addAll(allApps);
                  appAdapter.notifyDataSetChanged();
                  updateCount();
              }

              private void filter(String q) {
                  shownApps.clear();
                  String x = q.toLowerCase();

                  for (int i = 0; i < allApps.size(); i++) {
                      AppItem item = allApps.get(i);
                      if (item.label.toLowerCase().contains(x) || item.packageName.toLowerCase().contains(x)) {
                          shownApps.add(item);
                      }
                  }

                  appAdapter.notifyDataSetChanged();
              }

              private void addClone(AppItem app) {
                  int nomor = 1;

                  for (int i = 0; i < clones.size(); i++) {
                      if (clones.get(i).packageName.equals(app.packageName)) {
                          nomor++;
                      }
                  }

                  clones.add(new CloneItem(app.label + " " + nomor, app.packageName));
                  saveClones();
                  cloneAdapter.notifyDataSetChanged();
                  updateCount();

                  Toast.makeText(this, "Clone dibuat: " + app.label, Toast.LENGTH_SHORT).show();
              }

              private void openApp(String packageName) {
                  Intent launch = getPackageManager().getLaunchIntentForPackage(packageName);

                  if (launch != null) {
                      startActivity(launch);
                  } else {
                      Toast.makeText(this, "Aplikasi tidak bisa dibuka", Toast.LENGTH_SHORT).show();
                  }
              }

              private void loadClones() {
                  clones.clear();

                  String data = prefs.getString("clones", "");
                  if (data == null || data.length() == 0) return;

                  String[] lines = data.split("\\n");

                  for (int i = 0; i < lines.length; i++) {
                      String[] p = lines[i].split("\\|", 2);
                      if (p.length == 2) {
                          clones.add(new CloneItem(p[0], p[1]));
                      }
                  }
              }

              private void saveClones() {
                  StringBuilder sb = new StringBuilder();

                  for (int i = 0; i < clones.size(); i++) {
                      CloneItem c = clones.get(i);
                      sb.append(c.label.replace("|", " "))
                        .append("|")
                        .append(c.packageName)
                        .append("\n");
                  }

                  prefs.edit().putString("clones", sb.toString()).apply();
              }

              private void updateCount() {
                  cloneCount.setText(clones.size() + " Clone");
                  appCount.setText(allApps.size() + " App");
              }

              private TextView section(String s) {
                  TextView tv = new TextView(this);
                  tv.setText(s);
                  tv.setTextColor(Color.parseColor("#1A1D29"));
                  tv.setTextSize(18);
                  tv.setTypeface(Typeface.DEFAULT_BOLD);
                  tv.setPadding(0, dp(10), 0, dp(6));
                  return tv;
              }

              private TextView statBox(String s) {
                  TextView tv = new TextView(this);
                  tv.setText(s);
                  tv.setTextColor(Color.WHITE);
                  tv.setTextSize(16);
                  tv.setTypeface(Typeface.DEFAULT_BOLD);
                  tv.setGravity(Gravity.CENTER);
                  tv.setBackground(box("#33FFFFFF", 18, "#66FFFFFF"));
                  return tv;
              }

              private GradientDrawable gradient(String a, String b, int r) {
                  GradientDrawable gd = new GradientDrawable(
                          GradientDrawable.Orientation.LEFT_RIGHT,
                          new int[]{Color.parseColor(a), Color.parseColor(b)}
                  );
                  gd.setCornerRadius(dp(r));
                  return gd;
              }

              private GradientDrawable box(String color, int radius, String stroke) {
                  GradientDrawable gd = new GradientDrawable();
                  gd.setColor(Color.parseColor(color));
                  gd.setCornerRadius(dp(radius));
                  if (stroke != null) gd.setStroke(dp(1), Color.parseColor(stroke));
                  return gd;
              }

              private int dp(int v) {
                  return (int) (v * getResources().getDisplayMetrics().density);
              }

              private class AppAdapter extends BaseAdapter {
                  @Override public int getCount() { return shownApps.size(); }
                  @Override public Object getItem(int p) { return shownApps.get(p); }
                  @Override public long getItemId(int p) { return p; }

                  @Override
                  public View getView(int p, View convertView, ViewGroup parent) {
                      AppItem app = shownApps.get(p);

                      LinearLayout box = new LinearLayout(MainActivity.this);
                      box.setOrientation(LinearLayout.VERTICAL);
                      box.setGravity(Gravity.CENTER);
                      box.setPadding(dp(4), dp(8), dp(4), dp(8));

                      ImageView icon = new ImageView(MainActivity.this);
                      icon.setImageDrawable(app.icon);
                      box.addView(icon, new LinearLayout.LayoutParams(dp(52), dp(52)));

                      TextView name = new TextView(MainActivity.this);
                      name.setText(app.label);
                      name.setTextSize(12);
                      name.setTextColor(Color.parseColor("#2A2D36"));
                      name.setGravity(Gravity.CENTER);
                      name.setMaxLines(2);
                      name.setPadding(0, dp(6), 0, 0);
                      box.addView(name);

                      TextView add = new TextView(MainActivity.this);
                      add.setText("+ Clone");
                      add.setTextSize(10);
                      add.setTextColor(Color.parseColor("#247CFF"));
                      add.setGravity(Gravity.CENTER);
                      box.addView(add);

                      return box;
                  }
              }

              private class CloneAdapter extends BaseAdapter {
                  @Override public int getCount() { return clones.size(); }
                  @Override public Object getItem(int p) { return clones.get(p); }
                  @Override public long getItemId(int p) { return p; }

                  @Override
                  public View getView(int p, View convertView, ViewGroup parent) {
                      CloneItem clone = clones.get(p);

                      LinearLayout box = new LinearLayout(MainActivity.this);
                      box.setOrientation(LinearLayout.VERTICAL);
                      box.setGravity(Gravity.CENTER);
                      box.setPadding(dp(4), dp(8), dp(4), dp(8));
                      box.setBackground(box("#FFFFFF", 18, "#E3EAFF"));

                      ImageView icon = new ImageView(MainActivity.this);
                      try {
                          icon.setImageDrawable(getPackageManager().getApplicationIcon(clone.packageName));
                      } catch (Exception e) {}
                      box.addView(icon, new LinearLayout.LayoutParams(dp(50), dp(50)));

                      TextView name = new TextView(MainActivity.this);
                      name.setText(clone.label);
                      name.setTextSize(11);
                      name.setTextColor(Color.parseColor("#1A1D29"));
                      name.setGravity(Gravity.CENTER);
                      name.setMaxLines(2);
                      name.setPadding(0, dp(6), 0, 0);
                      box.addView(name);

                      return box;
                  }
              }

              private static class AppItem {
                  String label;
                  String packageName;
                  Drawable icon;

                  AppItem(String label, String packageName, Drawable icon) {
                      this.label = label;
                      this.packageName = packageName;
                      this.icon = icon;
                  }
              }

              private static class CloneItem {
                  String label;
                  String packageName;

                  CloneItem(String label, String packageName) {
                      this.label = label;
                      this.packageName = packageName;
                  }
              }
          }
          EOF

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Download Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip
          echo "$PWD/gradle-8.7/bin" >> "$GITHUB_PATH"

      - name: Build APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DualCloneSpace-apk
          path: app/build/outputs/apk/debug/*.apk
